name: Build SubtitleTranslator
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files (帮我们看项目结构)
        run: ls -la

      - name: 直接用xcodebuild编译
        run: |
          # 先尝试找所有的.xcodeproj文件
          PROJECT_FILE=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "没有找到.xcodeproj文件，尝试找.xcworkspace"
            WORKSPACE_FILE=$(find . -name "*.xcworkspace" | head -n 1)
            if [ -z "$WORKSPACE_FILE" ]; then
              echo "❌ 既没有.xcodeproj也没有.xcworkspace，构建失败"
              exit 1
            else
              echo "找到工作区: $WORKSPACE_FILE"
              SCHEME=SubtitlesApp
              xcodebuild archive \
                -workspace "$WORKSPACE_FILE" \
                -scheme "$SCHEME" \
                -configuration Release \
                -archivePath SubtitlesApp.xcarchive \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO
            fi
          else
            echo "找到项目文件: $PROJECT_FILE"
            SCHEME=SubtitlesApp
            xcodebuild archive \
              -project "$PROJECT_FILE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -archivePath SubtitlesApp.xcarchive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

          # 导出IPA
          xcodebuild -exportArchive \
            -archivePath SubtitlesApp.xcarchive \
            -exportPath . \
            -exportOptionsPlist <(echo '<?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>development</string>
                <key>signingStyle</key>
                <string>manual</string>
            </dict>
            </plist>')

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleTranslator-IPA
          path: "*.ipa"
